<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Manrope', sans-serif; }
        .glass-header {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation (Shared Component Integration) -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-[#f9f9f7]/80 backdrop-blur-md shadow-sm shadow-black/5">
<div class="flex items-center gap-8">
<span class="text-xl font-bold tracking-tighter text-[#1a1c1b]">CargoClaw</span>
<div class="hidden md:flex items-center gap-6">
<a class="text-[#1a1c1b]/60 hover:text-[#1a1c1b] font-['Manrope'] tracking-tight transition-colors" href="#">Fleet</a>
<a class="text-[#1a1c1b]/60 hover:text-[#1a1c1b] font-['Manrope'] tracking-tight transition-colors" href="#">Logistics</a>
<a class="text-[#006d40] border-b-2 border-[#00FF9C] pb-1 font-['Manrope'] tracking-tight" href="#">Intelligence</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#f4f4f2] transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 hover:bg-[#f4f4f2] transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container ml-2">

</div>
</div>
</nav>
<!-- Side Navigation (Visible on Desktop) -->
<aside class="fixed left-0 top-0 h-full flex flex-col pt-20 pb-4 z-40 bg-[#f4f4f2] w-20 hover:w-64 transition-all duration-300 group">
<div class="flex flex-col gap-2 px-4">
<div class="flex items-center gap-4 p-3 text-[#1a1c1b]/40 hover:bg-[#ffffff]/50 rounded-sm transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="opacity-0 group-hover:opacity-100 font-['Manrope'] text-sm font-medium uppercase tracking-widest whitespace-nowrap">Dashboard</span>
</div>
<div class="flex items-center gap-4 p-3 text-[#1a1c1b]/40 hover:bg-[#ffffff]/50 rounded-sm transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="alt_route">alt_route</span>
<span class="opacity-0 group-hover:opacity-100 font-['Manrope'] text-sm font-medium uppercase tracking-widest whitespace-nowrap">Routes</span>
</div>
<div class="flex items-center gap-4 p-3 text-[#1a1c1b]/40 hover:bg-[#ffffff]/50 rounded-sm transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="opacity-0 group-hover:opacity-100 font-['Manrope'] text-sm font-medium uppercase tracking-widest whitespace-nowrap">Inventory</span>
</div>
<div class="flex items-center gap-4 p-3 text-[#1a1c1b]/40 hover:bg-[#ffffff]/50 rounded-sm transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="opacity-0 group-hover:opacity-100 font-['Manrope'] text-sm font-medium uppercase tracking-widest whitespace-nowrap">Analytics</span>
</div>
<div class="flex items-center gap-4 p-3 text-[#1a1c1b]/40 hover:bg-[#ffffff]/50 rounded-sm transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="archive">archive</span>
<span class="opacity-0 group-hover:opacity-100 font-['Manrope'] text-sm font-medium uppercase tracking-widest whitespace-nowrap">Archive</span>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="ml-20 min-h-screen pt-16 flex flex-col relative overflow-hidden">
<!-- Background Artistic Element (Asymmetric) -->
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[80%] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container/20 via-transparent to-transparent -z-10 blur-3xl"></div>
<div class="flex-1 flex flex-col items-center justify-center px-6 max-w-5xl mx-auto w-full pb-20">
<!-- Hero Typography -->
<div class="w-full text-left mb-12">
<p class="font-['Manrope'] text-sm font-medium uppercase tracking-widest text-on-surface-variant mb-4 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container shadow-[0_0_8px_#00FF9C]"></span>
                    CargoClaw Intelligence
                </p>
<h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-on-surface max-w-2xl leading-[1.1]">
                    What would you like to know about the <span class="text-primary italic">fleet</span> today?
                </h1>
</div>
<!-- Focused Input Field Section -->
<div class="w-full relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-primary-container/20 to-secondary-container/20 rounded-lg blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
<div class="relative bg-surface-container-lowest shadow-xl shadow-black/5 rounded-lg flex items-center p-2">
<div class="pl-6 pr-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="terminal">terminal</span>
</div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-xl font-medium py-6 text-on-surface placeholder:text-on-surface/30" placeholder="Analyze route efficiency for Eastern Corridor..." type="text"/>
<button class="bg-gradient-to-br from-primary to-primary-fixed-dim text-white px-8 py-4 rounded-lg flex items-center gap-3 hover:scale-[1.02] transition-transform active:scale-95 shadow-lg shadow-primary/10">
<span class="font-bold tracking-tight">Execute</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Suggestion Chips (Asymmetric Layout) -->
<div class="w-full mt-12 flex flex-wrap gap-3 justify-start">
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full text-sm font-medium flex items-center gap-2 border border-outline-variant/10">
<span class="material-symbols-outlined text-xs" data-icon="trending_up">trending_up</span>
                    Fleet Utilization Report
                </button>
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full text-sm font-medium flex items-center gap-2 border border-outline-variant/10">
<span class="material-symbols-outlined text-xs" data-icon="warning">warning</span>
                    Predictive Maintenance Alerts
                </button>
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full text-sm font-medium flex items-center gap-2 border border-outline-variant/10">
<span class="material-symbols-outlined text-xs" data-icon="eco">eco</span>
                    Carbon Emission Analysis
                </button>
<button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full text-sm font-medium flex items-center gap-2 border border-outline-variant/10">
<span class="material-symbols-outlined text-xs" data-icon="local_shipping">local_shipping</span>
                    Transit Delays by Hub
                </button>
</div>
</div>
<!-- Network Status Indicator & Bottom Navigation (Shared Component Context) -->
<div class="fixed bottom-0 left-0 w-full z-50 flex flex-col items-center gap-4 pointer-events-none">

<div class="pointer-events-auto mb-2 flex items-center gap-6 px-6 py-2 bg-white/80 backdrop-blur-md rounded-full border border-outline-variant/10 shadow-sm">
<div class="flex items-center gap-2">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant">Systems Nominal</span>
</div>
<div class="h-4 w-px bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xs text-on-surface-variant" data-icon="dns">dns</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant">v2.4.1 Intelligence Core</span>
</div>
</div>
<!-- Agent Floating Action (Shared Component Logic) -->
<div class="pb-safe pointer-events-auto">
<div class="bg-[#1a1c1b] rounded-sm max-w-md mx-auto mb-6 px-6 py-3 flex items-center gap-3 shadow-[0_8px_32px_rgba(26,28,27,0.15)] hover:scale-105 transition-transform active:scale-95 cursor-pointer">
<span class="material-symbols-outlined text-[#00FF9C]" data-icon="terminal">terminal</span>
<span class="font-['Manrope'] font-bold text-xs uppercase tracking-widest text-[#00FF9C]">Command Agent</span>
</div>
</div>
</div>
</main>
<!-- Decoration: Structural Visual Noise (Cargo Aesthetic) -->
<div class="fixed top-24 left-10 pointer-events-none opacity-5">
<span class="text-9xl font-black tracking-tighter select-none">CARGO</span>
</div>
<div class="fixed bottom-10 right-10 pointer-events-none opacity-5">
<span class="text-9xl font-black tracking-tighter select-none">09-C</span>
</div>
